schema {
  query: Query
  mutation: Mutation
}

type Query {
  activeAutoSave: ImportLog
  importHistory("Returns the first _n_ elements from the list." first: Int "Returns the elements in the list that come after the specified cursor." after: String "Returns the last _n_ elements from the list." last: Int "Returns the elements in the list that come before the specified cursor." before: String): ImportHistoryConnection
  importById(id: UUID!): ImportLog
  importSummary: ImportSummary!
  users: [User!]!
  products(searchTerm: String categoryId: UUID order: [ProductSortInput!]): [Product!]!
  productsPagination(searchTerm: String categoryId: UUID minPrice: Long maxPrice: Long "Returns the first _n_ elements from the list." first: Int "Returns the elements in the list that come after the specified cursor." after: String "Returns the last _n_ elements from the list." last: Int "Returns the elements in the list that come before the specified cursor." before: String order: [ProductSortInput!]): ProductsPaginationConnection
  productById(id: UUID!): Product
  categories: [Category!]!
  orders("Returns the first _n_ elements from the list." first: Int "Returns the elements in the list that come after the specified cursor." after: String "Returns the last _n_ elements from the list." last: Int "Returns the elements in the list that come before the specified cursor." before: String order: [OrderSortInput!]): OrdersConnection
  ordersPagination(receiptNumber: String startDate: DateTime endDate: DateTime "Returns the first _n_ elements from the list." first: Int "Returns the elements in the list that come after the specified cursor." after: String "Returns the last _n_ elements from the list." last: Int "Returns the elements in the list that come before the specified cursor." before: String order: [OrderSortInput!]): OrdersPaginationConnection
  orderById(id: UUID!): Order
}

type Mutation {
  completeImport(input: CompleteImportInput!): ImportLog!
  deleteImport(importId: UUID!): Boolean!
  markImportCompleted(importId: UUID!): ImportLog!
  login(username: String! password: String!): LoginResultDTO!
  createProduct(input: CreateProductInput!): Product!
  updateProduct(input: UpdateProductInput!): Product!
  deleteProduct(id: UUID!): Boolean!
  createCategory(name: String!): Category!
  deleteCategory(id: UUID!): Boolean!
}

input ProductSortInput {
  id: SortEnumType
  categoryId: SortEnumType
  sku: SortEnumType
  name: SortEnumType
  importPrice: SortEnumType
  salePrice: SortEnumType
  stockQuantity: SortEnumType
  isDraft: SortEnumType
  createdAt: SortEnumType
  updatedAt: SortEnumType
  category: CategorySortInput
}

"A connection to a list of items."
type ProductsPaginationConnection {
  "Information to aid in pagination."
  pageInfo: PageInfo!
  "A list of edges."
  edges: [ProductsPaginationEdge!]
  "A flattened list of the nodes."
  nodes: [Product!]
}

"A connection to a list of items."
type ImportHistoryConnection {
  "Information to aid in pagination."
  pageInfo: PageInfo!
  "A list of edges."
  edges: [ImportHistoryEdge!]
  "A flattened list of the nodes."
  nodes: [ImportLog!]
  "Identifies the total count of items in the connection."
  totalCount: Int!
}

input OrderSortInput {
  id: SortEnumType
  receiptNumber: SortEnumType
  status: SortEnumType
  note: SortEnumType
  totalAmount: SortEnumType
  totalProfit: SortEnumType
  isDraft: SortEnumType
  orderDate: SortEnumType
  updatedAt: SortEnumType
}

"A connection to a list of items."
type OrdersConnection {
  "Information to aid in pagination."
  pageInfo: PageInfo!
  "A list of edges."
  edges: [OrdersEdge!]
  "A flattened list of the nodes."
  nodes: [Order!]
}

"A connection to a list of items."
type OrdersPaginationConnection {
  "Information to aid in pagination."
  pageInfo: PageInfo!
  "A list of edges."
  edges: [OrdersPaginationEdge!]
  "A flattened list of the nodes."
  nodes: [Order!]
}

enum SortEnumType {
  ASC
  DESC
}

input CategorySortInput {
  id: SortEnumType
  name: SortEnumType
}

"Information about pagination in a connection."
type PageInfo {
  "Indicates whether more edges exist following the set defined by the clients arguments."
  hasNextPage: Boolean!
  "Indicates whether more edges exist prior the set defined by the clients arguments."
  hasPreviousPage: Boolean!
  "When paginating backwards, the cursor to continue."
  startCursor: String
  "When paginating forwards, the cursor to continue."
  endCursor: String
}

"An edge in a connection."
type ProductsPaginationEdge {
  "A cursor for use in pagination."
  cursor: String!
  "The item at the end of the edge."
  node: Product!
}

"An edge in a connection."
type ImportHistoryEdge {
  "A cursor for use in pagination."
  cursor: String!
  "The item at the end of the edge."
  node: ImportLog!
}

"An edge in a connection."
type OrdersEdge {
  "A cursor for use in pagination."
  cursor: String!
  "The item at the end of the edge."
  node: Order!
}

"An edge in a connection."
type OrdersPaginationEdge {
  "A cursor for use in pagination."
  cursor: String!
  "The item at the end of the edge."
  node: Order!
}

input UpdateProductInput {
  id: UUID!
  sku: String!
  name: String!
  categoryId: UUID!
  salePrice: Long!
  imagePaths: [String!]!
}

input CreateProductInput {
  sku: String!
  name: String!
  categoryId: UUID!
  imagePaths: [String!]!
}

type LoginResultDTO {
  success: Boolean!
  message: String!
}

type Order {
  id: UUID!
  receiptNumber: Int!
  status: String!
  note: String
  totalAmount: Long!
  totalProfit: Long!
  isDraft: Boolean!
  orderDate: DateTime!
  updatedAt: DateTime!
  orderItems: [OrderItem]
}

"The `DateTime` scalar represents an ISO-8601 compliant date time type."
scalar DateTime

type ImportSummary {
  totalCount: Int!
  totalAmount: Decimal!
  draftCount: Int!
}

type ImportLog {
  id: UUID!
  createdAt: DateTime!
  totalAmount: Long!
  status: ImportStatus!
  isAutoSaved: Boolean!
  details: [ImportLogDetail!]!
}

type Category {
  id: UUID!
  name: String!
  products: [Product]
}

"The `Long` scalar type represents non-fractional signed whole 64-bit numeric values. Long can represent values between -(2^63) and 2^63 - 1."
scalar Long

scalar UUID

type Product {
  id: UUID!
  categoryId: UUID!
  sku: String!
  name: String!
  importPrice: Long
  salePrice: Long
  stockQuantity: Int!
  isDraft: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
  category: Category!
  importLogs: [ImportLogDetail!]!
  images: [ProductImage!]!
}

type User {
  id: UUID!
  username: String!
  passwordHash: String!
  hasCompletedOnboarding: Boolean!
}

input CompleteImportInput {
  details: [ImportLogDetailInput!]!
  isDraft: Boolean!
  isAutoSave: Boolean!
}

input ImportLogDetailInput {
  productId: UUID!
  quantityAdded: Int!
  actualImportPrice: Long!
}

type ProductImage {
  id: UUID!
  productId: UUID!
  product: Product
  imagePath: String!
  isPrimary: Boolean!
}

type ImportLogDetail {
  id: UUID!
  importLogId: UUID!
  productId: UUID!
  quantityAdded: Int!
  actualImportPrice: Long!
  importLog: ImportLog
  product: Product
}

enum ImportStatus {
  DRAFT
  COMPLETED
}

"The `Decimal` scalar type represents a decimal floating-point number."
scalar Decimal

type OrderItem {
  id: UUID!
  orderId: UUID!
  productId: UUID!
  quantity: Int!
  unitSalePrice: Long!
  unitImportPrice: Long!
  totalPrice: Long!
  order: Order
  product: Product
}

"The purpose of the `cost` directive is to define a `weight` for GraphQL types, fields, and arguments. Static analysis can use these weights when calculating the overall cost of a query or response."
directive @cost("The `weight` argument defines what value to add to the overall cost for every appearance, or possible appearance, of a type, field, argument, etc." weight: String!) on SCALAR | OBJECT | FIELD_DEFINITION | ARGUMENT_DEFINITION | ENUM | INPUT_FIELD_DEFINITION

"The purpose of the `@listSize` directive is to either inform the static analysis about the size of returned lists (if that information is statically available), or to point the analysis to where to find that information."
directive @listSize("The `assumedSize` argument can be used to statically define the maximum length of a list returned by a field." assumedSize: Int "The `slicingArguments` argument can be used to define which of the field's arguments with numeric type are slicing arguments, so that their value determines the size of the list returned by that field. It may specify a list of multiple slicing arguments." slicingArguments: [String!] "The `slicingArgumentDefaultValue` argument can be used to define a default value for a slicing argument, which is used if the argument is not present in a query." slicingArgumentDefaultValue: Int "The `sizedFields` argument can be used to define that the value of the `assumedSize` argument or of a slicing argument does not affect the size of a list returned by a field itself, but that of a list returned by one of its sub-fields." sizedFields: [String!] "The `requireOneSlicingArgument` argument can be used to inform the static analysis that it should expect that exactly one of the defined slicing arguments is present in a query. If that is not the case (i.e., if none or multiple slicing arguments are present), the static analysis may throw an error." requireOneSlicingArgument: Boolean! = true) on FIELD_DEFINITION