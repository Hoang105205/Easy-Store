query GetDashboardStats($days: Int) {
  dashboardStats(days: $days) {
    actualGrossRevenue
    actualRevenue
    totalPercentIncreaseRevenue
    actualGrossProfit
    actualProfit
    totalPercentIncreaseProfit
    totalNewOrders
    totalPaidOrders
    nearlyOutOfStock { 
      name 
      quantity 
    }
    bestSellingProducts { 
      name 
      quantity
      lastOrder
    }
    totalRevenueGraph { 
      date 
      revenue 
    }
  }
}