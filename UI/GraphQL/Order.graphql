query GetOrders(
  $first: Int!, 
  $after: String
  ) {
  orders(
    first: $first, 
    after: $after
  ) {
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    nodes {
      id
      receiptNumber
      status
      totalAmount
      totalProfit
      orderDate
    }
  }
}

query GetOrdersPagination(
  $first: Int!, 
  $after: String,
  $receiptNumber: String,
  $startDate: DateTime,
  $endDate: DateTime
) {
  ordersPagination(
    first: $first, 
    after: $after,
    receiptNumber: $receiptNumber,
    startDate: $startDate,
    endDate: $endDate
  ) {
    totalCount
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    nodes {
      id
      receiptNumber
      status
      totalAmount
      totalProfit
      orderDate
    }
  }
}

query GetOrderById($id: UUID!) {
  orderById(id: $id) {
    id
    receiptNumber
    status
    totalAmount
    totalProfit
    isDraft
    orderDate
    updatedAt
    orderItems {
      orderId
      productId
      quantity
      unitSalePrice
      totalPrice
      product {
        name
        sku
        images {
          imagePath
          isPrimary
        }
      }
    }
  }
}
